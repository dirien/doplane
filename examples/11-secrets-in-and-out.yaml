# Level 11 — secrets in and out, no cloud credentials needed.
#
# valuesFrom injects a Secret value into a property without the value ever
# touching the object, etcd status, events or logs: the runner pod receives
# it as a kubelet-injected env var and redacts it from all output.
# writeConnectionSecretToRef publishes selected outputs into a Secret owned
# by the resource.
#
# The input Secret must live in the namespace runner Jobs execute in
# (this namespace with runner.namespaceMode=resource, the operator
# namespace otherwise).
apiVersion: v1
kind: Secret
metadata:
  name: pet-naming
stringData:
  prefix: super-secret-prefix
---
apiVersion: do.pulumi.com/v1alpha1
kind: DoResource
metadata:
  name: pet-secretive
spec:
  type: random:index/randomPet:RandomPet
  package: random@4.21.0
  properties:
    length: 2
  valuesFrom:
    - toPath: prefix
      secretKeyRef:
        name: pet-naming
        key: prefix
  writeConnectionSecretToRef:
    name: pet-connection
  connectionDetails:
    - name: petName
      fromFieldPath: status.id
    - name: owner
      value: team-payments
# After reconciliation:
#   kubectl get dores pet-secretive -o jsonpath='{.status.outputs.prefix}'
#     -> (redacted)
#   kubectl get secret pet-connection -o jsonpath='{.data.petName}' | base64 -d
#     -> the generated pet name (prefix intact inside the Secret's id value)
