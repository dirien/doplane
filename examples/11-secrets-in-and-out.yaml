# Level 11 — secrets in and out, no cloud credentials needed.
#
# valuesFrom injects a Secret value into a property without the value ever
# appearing in the manifest, the Job spec, events or logs: the runner pod
# receives it as a kubelet-injected env var, substitutes it right before the
# provider call, and redacts it from progress logs and error messages.
# Structured provider outputs may still echo the input (status is
# sensitive-adjacent) — see website/operations/security.
#
# Do NOT inject secrets into identity-forming properties (names, prefixes,
# separators): the provider-assigned ID would embed the secret value and the
# operator refuses to record it (SecretInputInID). Use a non-identity
# property — for RandomPet, a `keepers` entry.
#
# writeConnectionSecretToRef publishes selected outputs into a Secret owned
# by the resource.
#
# The input Secret must live in the namespace runner Jobs execute in
# (this namespace with runner.namespaceMode=resource, the operator
# namespace otherwise).
apiVersion: v1
kind: Secret
metadata:
  name: pet-naming
stringData:
  rotation: super-secret-rotation-token
---
apiVersion: do.pulumi.com/v1alpha1
kind: DoResource
metadata:
  name: pet-secretive
spec:
  type: random:index/randomPet:RandomPet
  package: random@4.21.0
  properties:
    length: 2
    prefix: sealed
  valuesFrom:
    - toPath: keepers.rotation
      secretKeyRef:
        name: pet-naming
        key: rotation
  writeConnectionSecretToRef:
    name: pet-connection
  connectionDetails:
    - name: petName
      fromFieldPath: status.id
    - name: owner
      value: team-payments
# After reconciliation:
#   kubectl get secret pet-connection -o jsonpath='{.data.petName}' | base64 -d
#     -> the generated pet name
#   Changing the Secret's `rotation` value replaces the pet on the next
#   reconcile (keepers force replacement), without the value ever appearing
#   in the manifest.
