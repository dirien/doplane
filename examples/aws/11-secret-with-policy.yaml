# AWS 11 — Secrets Manager secret + version + read policy
#
# A managed secret with an initial JSON value and a customer-managed IAM
# policy scoped to read exactly that secret. recoveryWindowInDays=0 makes the
# secret delete immediately on teardown (no 7–30 day recovery window to wait
# out). The version and the read policy both reference the secret ARN.
#
#   suffix ─> secret ─┬─> version
#                     └─> readpolicy
apiVersion: do.pulumi.com/v1alpha1
kind: DoCompositeDefinition
metadata:
  name: aws-app-secret
spec:
  resources:
    - name: suffix
      type: random:index/randomString:RandomString
      package: random@4.21.0
      properties:
        length: 6
        special: false
        upper: false
        numeric: true
    - name: secret
      type: aws:secretsmanager/secret:Secret
      package: aws@7.34.0
      properties:
        name: ${self.name}-${resources.suffix.id}
        description: App secret for ${self.name} (${params.env})
        recoveryWindowInDays: 0
        tags:
          managed-by: doplane
          env: ${params.env}
    - name: version
      type: aws:secretsmanager/secretVersion:SecretVersion
      package: aws@7.34.0
      properties:
        secretId: ${resources.secret.outputs.arn}
        secretString: '{"username":"app","password":"change-me"}'
    - name: readpolicy
      type: aws:iam/policy:Policy
      package: aws@7.34.0
      properties:
        name: ${self.name}-secret-read-${resources.suffix.id}
        policy: '{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Action":["secretsmanager:GetSecretValue","secretsmanager:DescribeSecret"],"Resource":"${resources.secret.outputs.arn}"}]}'
---
apiVersion: do.pulumi.com/v1alpha1
kind: DoComposite
metadata:
  name: creds-dev
spec:
  definition: aws-app-secret
  parameters:
    env: dev
---
apiVersion: do.pulumi.com/v1alpha1
kind: DoComposite
metadata:
  name: creds-prod
spec:
  definition: aws-app-secret
  parameters:
    env: prod
