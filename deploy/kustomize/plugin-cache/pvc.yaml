apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: doplane-plugin-cache
  namespace: doplane-system
spec:
  # ReadWriteMany lets concurrent runner Jobs on different nodes share one
  # cache; switch to ReadWriteOnce on single-node clusters (kind).
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 5Gi
