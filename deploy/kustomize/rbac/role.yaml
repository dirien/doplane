---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - ""
  resources:
  - persistentvolumeclaims
  - pods/log
  verbs:
  - get
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - create
  - get
  - update
- apiGroups:
  - apiextensions.k8s.io
  resources:
  - customresourcedefinitions
  verbs:
  - create
  - get
  - update
- apiGroups:
  - batch
  resources:
  - jobs
  verbs:
  - create
  - delete
  - get
  - list
  - watch
- apiGroups:
  - do.pulumi.com
  resources:
  - docompositedefinitionrevisions
  verbs:
  - create
  - delete
  - get
  - list
  - watch
- apiGroups:
  - do.pulumi.com
  resources:
  - docompositedefinitions
  - doproviderconfigs
  - doproviders
  - dousages
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - do.pulumi.com
  resources:
  - docompositedefinitions/status
  - docomposites/status
  - doproviderconfigs/status
  - doproviders/status
  - doresources/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - do.pulumi.com
  resources:
  - docomposites
  - doresources
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - do.pulumi.com
  resources:
  - docomposites/finalizers
  - doresources/finalizers
  verbs:
  - update
- apiGroups:
  - typed.do.pulumi.com
  resources:
  - '*'
  verbs:
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - typed.do.pulumi.com
  resources:
  - '*/status'
  verbs:
  - get
  - patch
  - update
