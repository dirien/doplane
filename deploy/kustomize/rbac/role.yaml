---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - pods/log
  verbs:
  - get
- apiGroups:
  - batch
  resources:
  - jobs
  verbs:
  - create
  - delete
  - get
  - list
  - watch
- apiGroups:
  - do.pulumi.com
  resources:
  - docompositedefinitions
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - do.pulumi.com
  resources:
  - docompositedefinitions/status
  - docomposites/status
  - doresources/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - do.pulumi.com
  resources:
  - docomposites
  - doresources
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - do.pulumi.com
  resources:
  - docomposites/finalizers
  - doresources/finalizers
  verbs:
  - update
