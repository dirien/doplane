              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: "DoCompositeDefinitionSpec declares a reusable template that
              expands one\nDoComposite into a graph of DoResources. Property values
              may contain\nexpressions:\n\n\t${params.<path>}                       composite
              parameter\n\t${self.name} / ${self.namespace}       composite identity\n\t${resources.<name>.outputs.<path>}
