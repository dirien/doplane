                items:
                  description: TypedAPIVersionStatus reports one served version of
                    a definition's API.
                  properties:
                    deprecated:
                      description: Deprecated marks a version served only for migration.
                      type: boolean
                    name:
                      description: Name of the version (e.g. v1alpha1).
                      type: string
                    objects:
                      description: |-
                        Objects counts typed objects whose manifests last wrote this
                        version. A deprecated version may be removed once this reaches zero.
                      format: int32
                      type: integer
                  required:
                  - name
                  - objects
                  type: object
                type: array
              composites:
                description: |-
                  Composites is the number of DoComposites currently using this
                  definition.
                format: int32
                type: integer
              conditions:
                description: Conditions (APIServed).
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
