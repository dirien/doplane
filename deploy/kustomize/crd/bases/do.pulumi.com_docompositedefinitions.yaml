                            Kind of the profile: DoProvider (cluster-scoped) or DoProviderConfig
                            (same namespace as this resource).
                          enum:
                          - DoProvider
                          - DoProviderConfig
                          type: string
                        name:
                          description: Name of the profile object.
                          minLength: 1
                          type: string
                      required:
                      - name
                      type: object
                    type:
                      description: Type is the Pulumi resource type token.
                      minLength: 1
                      type: string
                  required:
                  - name
                  - type
                  type: object
                minItems: 1
                type: array
            required:
            - resources
            type: object
            x-kubernetes-validations:
            - message: spec.api cannot be removed once set; delete the definition
                instead
              rule: '!has(oldSelf.api) || has(self.api)'
          status:
            description: DoCompositeDefinitionStatus reports observed state of a definition.
            properties:
              apiVersions:
