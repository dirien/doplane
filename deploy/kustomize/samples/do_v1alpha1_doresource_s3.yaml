# An AWS S3 bucket managed declaratively through `pulumi do`. Requires
# AWS credentials in the provider-credentials Secret (hack/sync-creds.sh).
apiVersion: do.pulumi.com/v1alpha1
kind: DoResource
metadata:
  labels:
    app.kubernetes.io/name: doplane
    app.kubernetes.io/managed-by: kustomize
  name: doresource-s3
spec:
  type: aws:s3/bucketV2:BucketV2
  # Pin to the plugin version baked into the runner image.
  package: aws@7.34.0
  properties:
    bucket: doplane-e2e
    tags:
      managed-by: doplane
      purpose: e2e-test
