# Sets the runner image used for doplane runner Jobs. Regenerated by the
# Makefile (deploy / build-installer) from RUNNER_IMG so the manager always
# points at the runner image that was actually built and pushed.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
  namespace: system
spec:
  template:
    spec:
      containers:
        - name: manager
          env:
            - name: RUNNER_IMAGE
              value: doplane-runner:dev
