# -- Number of manager replicas.
replicaCount: 1

image:
  # -- Full manager image reference. When set, repository/tag/digest are ignored.
  fullName: ""
  # -- Manager image repository.
  repository: controller
  # -- Manager image tag. Empty defaults to the chart appVersion (a pinned
  # release) rather than a mutable "latest" that IfNotPresent would run stale.
  tag: ""
  # -- Manager image digest. Takes precedence over tag when set.
  digest: ""
  # -- Manager image pull policy.
  pullPolicy: IfNotPresent

runnerImage:
  # -- Full runner image reference passed to RUNNER_IMAGE. When set, repository/tag/digest are ignored.
  fullName: ""
  # -- Runner image repository.
  repository: doplane-runner
  # -- Runner image tag.
  tag: dev
  # -- Runner image digest. Takes precedence over tag when set.
  digest: ""
  # -- Runner container pull policy ("Always"/"IfNotPresent"/"Never"). Empty
  # lets Kubernetes default it; set "Always" with a mutable runner tag so a
  # re-pushed fix is not masked by a node's cached image layer.
  pullPolicy: ""

# -- Namespaces the operator reconciles (namespace-scoped deployment).
# Empty watches the whole cluster. When set, manager RBAC shrinks to
# per-namespace Roles in these namespaces (plus the release namespace for
# runner Jobs, and a minimal ClusterRole for the cluster-scoped
# DoCompositeDefinitions).
watchNamespaces: []

runner:
  # -- Where runner Jobs execute: "operator" runs every Job in the release
  # namespace using its shared provider-credentials Secret; "resource" runs
  # each Job in the owning DoResource's namespace and resolves that
  # namespace's provider-credentials Secret — per-tenant cloud credentials.
  namespaceMode: operator

pluginCache:
  # -- Enable the shared writable plugin cache: runner Jobs mount a PVC and
  # install pinned provider plugins there on first use, so new providers
  # need YAML changes only — no runner image rebuild. PVC references are
  # namespace-local: with runner.namespaceMode=resource, tenant-namespace
  # Jobs mount a claim of the same name in their own namespace when one
  # exists (pre-create it per tenant), and fall back to baked plugins plus
  # on-demand downloads otherwise.
  enabled: false
  # -- Create the PersistentVolumeClaim. Set false to manage it yourself.
  create: true
  # -- Use an existing claim instead of creating one.
  existingClaim: ""
  # -- StorageClass of the created claim. Empty uses the cluster default.
  # ReadWriteMany-capable storage lets runner Jobs on different nodes share
  # one cache.
  storageClassName: ""
  # -- Access modes of the created claim.
  accessModes:
    - ReadWriteMany
  # -- Size of the created claim; provider archives can be large.
  size: 5Gi
  # -- Where runner pods mount the cache (becomes the runner's PULUMI_HOME
  # plugin source).
  mountPath: /var/lib/doplane/pulumi-home

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # -- Specifies whether a ServiceAccount should be created.
  create: true
  # -- The name of the ServiceAccount to use.
  name: ""
  annotations: {}

rbac:
  # -- Specifies whether RBAC resources should be created.
  create: true
  # -- Create user-facing admin/editor/viewer ClusterRoles for Do resources.
  aggregateRoles: true

manager:
  command:
    - /manager
  args:
    - --metrics-bind-address=:8443
    - --leader-elect
    - --health-probe-bind-address=:8081
  podAnnotations:
    kubectl.kubernetes.io/default-container: manager
  podLabels: {}
  extraEnv: []
  extraVolumes: []
  extraVolumeMounts: []

metrics:
  service:
    enabled: true
    type: ClusterIP
    port: 8443
    targetPort: 8443
    annotations: {}
  serviceMonitor:
    enabled: false
    labels: {}
    annotations: {}
    interval: ""
    scrapeTimeout: ""
    path: /metrics
    scheme: https
    # -- Full tlsConfig for the metrics endpoint. When set (e.g. serverName +
    # a ca secret from a cert-manager serving cert), it REPLACES the insecure
    # default below so Prometheus verifies the metrics server certificate.
    tlsConfig: {}
    # -- Skip TLS verification of the metrics endpoint. Insecure: an in-cluster
    # MITM can capture the scrape bearer token. Prefer configuring tlsConfig
    # above with a real CA; this stays true only as the no-serving-cert
    # fallback.
    insecureSkipVerify: true
    bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
    metricRelabelings: []
    relabelings: []

resources:
  limits:
    cpu: 500m
    # Headroom for caching trimmed provider schemas and running several
    # blocking Job-backed reconciles at once; 256Mi OOM-kills the manager
    # under real AWS load (many resource types in flight).
    memory: 1Gi
  requests:
    cpu: 10m
    memory: 128Mi

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

nodeSelector: {}
tolerations: []
affinity: {}

priorityClassName: ""
terminationGracePeriodSeconds: 10
