---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: doproviderconfigs.do.pulumi.com
spec:
  group: do.pulumi.com
  names:
    kind: DoProviderConfig
    listKind: DoProviderConfigList
    plural: doproviderconfigs
    shortNames:
    - doprovcfg
    singular: doproviderconfig
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.package
      name: PACKAGE
      type: string
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: READY
      type: string
    - jsonPath: .status.conditions[?(@.type=='Ready')].reason
      name: REASON
      type: string
    - jsonPath: .status.dependents
      name: DEPENDENTS
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: AGE
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          DoProviderConfig is the namespaced twin of the cluster-scoped DoProvider:
          a tenant-owned provider profile. Its credentials Secret lives in the
          config's own namespace, so teams pin provider versions and rotate their
          own credentials without platform involvement. Resources opt in with
          spec.providerRef.kind: DoProviderConfig (resolved in the resource's
          namespace); per-tenant credential isolation at runtime requires the
          per-resource runner namespace mode.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              DoProviderSpec declares platform-level support for one provider package:
              the pinned version, where its credentials live, and which resources app
              teams may use. DoResources opt in via spec.providerRef.
            properties:
              allowedResources:
                description: |-
                  AllowedResources restricts which resource type tokens may use this
                  provider. Entries are full tokens ("aws:s3/bucketV2:BucketV2"),
                  module paths ("s3/bucketV2"), module globs ("s3/*") or "*". Empty
                  allows every resource of the package.
                items:
                  type: string
                type: array
              credentialKeys:
                description: |-
                  CredentialKeys lists keys that must exist in the credentials Secret
                  (e.g. DIGITALOCEAN_TOKEN). Missing keys surface as
                  CredentialsReady=False.
                items:
                  type: string
                type: array
              credentialsSecretRef:
                description: |-
                  CredentialsSecretRef names the Secret (in the runner namespace) whose
                  keys become environment variables of runner pods executing operations
                  for this provider. Empty keeps the deployment-wide default Secret.
                properties:
                  name:
                    description: Name of the Secret.
                    minLength: 1
                    type: string
                required:
                - name
                type: object
              package:
                description: |-
                  Package pins the provider package, in the form "name@version"
                  (e.g. "aws@7.34.0"). An unpinned "name" works but makes operations
                  non-reproducible and is surfaced with a warning.
                minLength: 1
                type: string
              typedResources:
                description: |-
                  TypedResources lists full resource tokens
                  ("aws:s3/bucketV2:BucketV2") to expose as generated, typed CRDs in
                  the typed.do.pulumi.com group: app teams then apply `kind: BucketV2`
                  with schema validation and kubectl explain, never a Pulumi token.
                  Each typed object is translated into an owned DoResource.
                items:
                  type: string
                type: array
            required:
            - package
            type: object
          status:
            description: DoProviderStatus reports the outcome of provider validation.
            properties:
              conditions:
                description: |-
                  Conditions represent the latest observations (Ready, SchemaFetched,
                  PluginReady, CredentialsReady).
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              dependents:
                description: |-
                  Dependents counts the DoResources currently referencing this
                  profile.
                format: int32
                type: integer
              lastSchemaFetchTime:
                description: |-
                  LastSchemaFetchTime is when the provider schema last validated
                  successfully.
                format: date-time
                type: string
              observedGeneration:
                description: ObservedGeneration is the spec generation last reconciled.
                format: int64
                type: integer
              package:
                description: Package is the resolved package name and version.
                properties:
                  name:
                    description: Name of the provider package.
                    type: string
                  version:
                    description: Version of the provider package as reported by its
                      schema.
                    type: string
                type: object
              plugin:
                description: Plugin reports plugin availability.
                properties:
                  cachePath:
                    description: |-
                      CachePath is the shared plugin cache mount inside runner pods, when
                      the cache is enabled.
                    type: string
                  ready:
                    description: |-
                      Ready is true when runner Jobs can execute operations for this
                      provider without manual plugin installation.
                    type: boolean
                type: object
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
