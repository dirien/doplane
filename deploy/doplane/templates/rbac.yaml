{{- if .Values.rbac.create }}
{{- $fullname := include "doplane.fullname" . -}}
{{- $managerRoleName := printf "%s-manager-role" $fullname | trunc 63 | trimSuffix "-" -}}
{{- $managerRoleBindingName := printf "%s-manager-rolebinding" $fullname | trunc 63 | trimSuffix "-" -}}
{{- $leaderElectionRoleName := printf "%s-leader-election-role" $fullname | trunc 63 | trimSuffix "-" -}}
{{- $leaderElectionRoleBindingName := printf "%s-leader-election-rolebinding" $fullname | trunc 63 | trimSuffix "-" -}}
{{- $metricsAuthRoleName := printf "%s-metrics-auth-role" $fullname | trunc 63 | trimSuffix "-" -}}
{{- $metricsAuthRoleBindingName := printf "%s-metrics-auth-rolebinding" $fullname | trunc 63 | trimSuffix "-" -}}
{{- $metricsReaderName := printf "%s-metrics-reader" $fullname | trunc 63 | trimSuffix "-" -}}
{{- if .Values.watchNamespaces }}
{{/*
Namespace-scoped install: namespaced permissions become Roles in every
watched namespace plus the release namespace (runner Jobs in "operator"
namespace mode run there); only the cluster-scoped DoCompositeDefinition
rules stay in a ClusterRole.
*/}}
{{- range $ns := (concat .Values.watchNamespaces (list .Release.Namespace) | uniq) }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $managerRoleName }}
  namespace: {{ $ns }}
  labels:
    {{- include "doplane.labels" $ | nindent 4 }}
rules:
  {{- include "doplane.managerNamespacedRules" $ | nindent 2 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $managerRoleBindingName }}
  namespace: {{ $ns }}
  labels:
    {{- include "doplane.labels" $ | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $managerRoleName }}
subjects:
  - kind: ServiceAccount
    name: {{ include "doplane.serviceAccountName" $ }}
    namespace: {{ $.Release.Namespace }}
---
{{- end }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ $managerRoleName }}
  labels:
    {{- include "doplane.labels" . | nindent 4 }}
rules:
  {{- include "doplane.managerClusterRules" . | nindent 2 }}
{{- else }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ $managerRoleName }}
  labels:
    {{- include "doplane.labels" . | nindent 4 }}
rules:
  {{- include "doplane.managerNamespacedRules" . | nindent 2 }}
  {{- include "doplane.managerClusterRules" . | nindent 2 }}
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ $managerRoleBindingName }}
  labels:
    {{- include "doplane.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ $managerRoleName }}
subjects:
  - kind: ServiceAccount
    name: {{ include "doplane.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $leaderElectionRoleName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "doplane.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - ""
    resources:
      - configmaps
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $leaderElectionRoleBindingName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "doplane.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $leaderElectionRoleName }}
subjects:
  - kind: ServiceAccount
    name: {{ include "doplane.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ $metricsAuthRoleName }}
  labels:
    {{- include "doplane.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - authentication.k8s.io
    resources:
      - tokenreviews
    verbs:
      - create
  - apiGroups:
      - authorization.k8s.io
    resources:
      - subjectaccessreviews
    verbs:
      - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ $metricsAuthRoleBindingName }}
  labels:
    {{- include "doplane.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ $metricsAuthRoleName }}
subjects:
  - kind: ServiceAccount
    name: {{ include "doplane.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ $metricsReaderName }}
  labels:
    {{- include "doplane.labels" . | nindent 4 }}
rules:
  - nonResourceURLs:
      - /metrics
    verbs:
      - get
{{- if .Values.rbac.aggregateRoles }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ printf "%s-doresource-admin-role" $fullname | trunc 63 | trimSuffix "-" }}
  labels:
    {{- include "doplane.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - do.pulumi.com
    resources:
      - doresources
    verbs:
      - '*'
  - apiGroups:
      - do.pulumi.com
    resources:
      - doresources/status
    verbs:
      - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ printf "%s-doresource-editor-role" $fullname | trunc 63 | trimSuffix "-" }}
  labels:
    {{- include "doplane.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - do.pulumi.com
    resources:
      - doresources
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - do.pulumi.com
    resources:
      - doresources/status
    verbs:
      - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ printf "%s-doresource-viewer-role" $fullname | trunc 63 | trimSuffix "-" }}
  labels:
    {{- include "doplane.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - do.pulumi.com
    resources:
      - doresources
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - do.pulumi.com
    resources:
      - doresources/status
    verbs:
      - get
{{- end }}
{{- end }}
