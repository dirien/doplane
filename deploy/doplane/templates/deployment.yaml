apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "doplane.controllerManagerName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "doplane.labels" . | nindent 4 }}
    app.kubernetes.io/component: manager
    control-plane: controller-manager
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "doplane.managerSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "doplane.managerSelectorLabels" . | nindent 8 }}
        {{- with .Values.manager.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.manager.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "doplane.serviceAccountName" . }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: manager
          image: {{ include "doplane.managerImage" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            {{- toYaml .Values.manager.command | nindent 12 }}
          args:
            {{- toYaml .Values.manager.args | nindent 12 }}
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: RUNNER_IMAGE
              value: {{ include "doplane.runnerImage" . | quote }}
            - name: RUNNER_NAMESPACE_MODE
              value: {{ .Values.runner.namespaceMode | quote }}
            {{- with .Values.runnerImage.pullPolicy }}
            - name: RUNNER_IMAGE_PULL_POLICY
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.watchNamespaces }}
            - name: WATCH_NAMESPACES
              value: {{ join "," . | quote }}
            {{- end }}
            {{- if .Values.pluginCache.enabled }}
            - name: PLUGIN_CACHE_PVC
              value: {{ include "doplane.pluginCacheClaimName" . | quote }}
            - name: PLUGIN_CACHE_MOUNT_PATH
              value: {{ .Values.pluginCache.mountPath | quote }}
            {{- end }}
            {{- with .Values.manager.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.manager.extraVolumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.manager.extraVolumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . | quote }}
      {{- end }}
