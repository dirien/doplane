              of:
                description: |-
                  Of names the DoResource (same namespace) whose deletion is blocked
                  while this usage exists.
                properties:
                  name:
                    description: Name of the DoResource in this namespace.
                    minLength: 1
                    type: string
                    x-kubernetes-validations:
                    - message: spec.of.name is immutable
                      rule: self == oldSelf
                required:
                - name
                type: object
              reason:
                description: |-
                  Reason documents who or what depends on the resource, e.g.
                  "database is used by the payments namespace". Surfaced in the
                  blocked resource's conditions.
                type: string
            required:
            - of
            type: object
        type: object
    served: true
    storage: true
    subresources: {}
